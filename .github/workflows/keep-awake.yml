name: Keep Render awake

# Render's free tier spins a service down after ~15 min of inactivity, causing
# a slow cold start on the next visit. This workflow pings both services every
# ~10 minutes so they stay warm and load instantly for users.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (GitHub may delay a few min)
  workflow_dispatch: {} # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend (health)
        run: curl -s -m 90 -o /dev/null -w "backend  %{http_code}\n" https://nexusllm-3x5q.onrender.com/health || true
      - name: Ping frontend
        run: curl -s -m 90 -o /dev/null -w "frontend %{http_code}\n" https://nexusllm-frontend.onrender.com/ || true
